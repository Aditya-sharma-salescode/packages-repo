name: Publish (GitHub Packages)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Do not set registry-url here — it can set the default registry to GitHub Packages
          # and break installs of public packages (e.g. uuid). Scoped registries live in repo .npmrc.

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # One PAT for install + publish: read:packages + write:packages (classic PAT on package owner).
      # Write to project + HOME so npm/pnpm find auth from any package cwd (pnpm -r publish cds into each pkg).
      - name: Authenticate GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Set repository secret GH_PACKAGES_TOKEN (PAT with read:packages + write:packages)."
            exit 1
          fi
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> "$HOME/.npmrc"

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm run build

      - name: Publish workspaces
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          publish_pkg() {
            local dir="$1"
            local name version output
            name=$(node -p "require('./${dir}/package.json').name")
            version=$(node -p "require('./${dir}/package.json').version")
            echo "→ ${name}@${version}"
            output=$(cd "${dir}" && npm publish --access=restricted --no-git-checks 2>&1) && { echo "  published"; return 0; }
            echo "${output}" | grep -qE "EPUBLISHCONFLICT|already been published|cannot publish over|E409|E422" \
              && { echo "  already published, skipping"; return 0; }
            echo "${output}"; return 1
          }

          find packages -maxdepth 1 -mindepth 1 -type d | sort | while read dir; do
            [ -f "${dir}/package.json" ] || continue
            private=$(node -p "require('./${dir}/package.json').private // false")
            [ "${private}" = "false" ] || continue
            publish_pkg "${dir}" || exit 1
          done
